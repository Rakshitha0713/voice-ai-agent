<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice AI Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 800px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
    }

    .lang-selector {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .lang-btn {
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .lang-btn.active, .lang-btn:hover {
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      border-color: transparent;
    }

    .chat-box {
      height: 350px;
      overflow-y: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }

    .message {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .user .avatar {
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
    }

    .agent .avatar {
      background: linear-gradient(135deg, #34d399, #059669);
    }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .user .bubble {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-bottom-right-radius: 4px;
    }

    .agent .bubble {
      background: rgba(255,255,255,0.1);
      border-bottom-left-radius: 4px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: white;
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 30px rgba(167,139,250,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(167,139,250,0.6);
    }

    .mic-btn.recording {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      animation: pulse 1s infinite;
      box-shadow: 0 0 40px rgba(239,68,68,0.6);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .mic-btn.disabled {
      background: rgba(255,255,255,0.1);
      cursor: not-allowed;
      box-shadow: none;
    }

    .status-bar {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
      min-height: 20px;
    }

    .status-bar.active { color: #a78bfa; }
    .status-bar.error { color: #ef4444; }

    .latency-bar {
      display: flex;
      justify-content: space-around;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 14px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
    }

    .latency-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .latency-item span:first-child {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .latency-value {
      color: #34d399;
      font-weight: bold;
      font-size: 0.9rem !important;
    }

    .latency-value.slow { color: #f59e0b !important; }
    .latency-value.very-slow { color: #ef4444 !important; }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 0.82rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }

    .dot.connected { background: #34d399; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏥 2Care.ai</h1>
      <p>Real-Time Multilingual Voice Appointment Agent</p>
    </div>

    <div class="connection-status">
      <div class="dot" id="connDot"></div>
      <span id="connText">Connecting...</span>
    </div>

    <div class="lang-selector">
      <button class="lang-btn active" onclick="setLang('en')">🇬🇧 English</button>
      <button class="lang-btn" onclick="setLang('hi')">🇮🇳 Hindi</button>
      <button class="lang-btn" onclick="setLang('ta')">🇮🇳 Tamil</button>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message agent">
        <div class="avatar">🤖</div>
        <div class="bubble">
          Hello! I'm your clinical appointment assistant. 
          Press the microphone and speak to book, reschedule, 
          or cancel an appointment.
        </div>
      </div>
    </div>

    <div class="status-bar" id="statusBar">
      Press the microphone to start speaking
    </div>

    <div class="controls">
      <button class="mic-btn disabled" id="micBtn" onclick="toggleRecording()">
        🎤
      </button>
    </div>

    <div class="latency-bar">
      <div class="latency-item">
        <span>STT</span>
        <span class="latency-value" id="sttLatency">--</span>
      </div>
      <div class="latency-item">
        <span>Agent</span>
        <span class="latency-value" id="agentLatency">--</span>
      </div>
      <div class="latency-item">
        <span>TTS</span>
        <span class="latency-value" id="ttsLatency">--</span>
      </div>
      <div class="latency-item">
        <span>Total</span>
        <span class="latency-value" id="totalLatency">--</span>
      </div>
    </div>
  </div>

  <script>
  let ws = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let selectedLang = 'en';
  let pendingResponseText = '';

  function setLang(lang) {
    selectedLang = lang;
    document.querySelectorAll('.lang-btn')
      .forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  function connectWebSocket() {
    ws = new WebSocket('ws://localhost:8000/ws/voice');
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      document.getElementById('connDot').classList.add('connected');
      document.getElementById('connText').textContent = 'Connected';
      document.getElementById('micBtn').classList.remove('disabled');
      setStatus('Ready! Press the microphone to speak', 'active');
    };

    ws.onclose = () => {
      document.getElementById('connDot').classList.remove('connected');
      document.getElementById('connText').textContent = 'Disconnected';
      document.getElementById('micBtn').classList.add('disabled');
      setStatus('Connection lost. Reconnecting...', 'error');
      setTimeout(connectWebSocket, 3000);
    };

    ws.onerror = (err) => {
      console.error('WebSocket error:', err);
      setStatus('Connection error', 'error');
    };

    ws.onmessage = async (event) => {
      // Text message (metadata)
      if (typeof event.data === 'string') {
        const data = JSON.parse(event.data);

        if (data.type === 'connected') {
          console.log('Connected to server');
          return;
        }

        if (data.type === 'error') {
          setStatus('❌ ' + data.message, 'error');
          removeTyping();
          // Re-enable mic button
          document.getElementById('micBtn').classList.remove('disabled');
          return;
        }

        if (data.type === 'response') {
          // Show user message
          addMessage('user', data.transcript);
          // Show typing indicator
          showTyping();
          // Store response text for display
          pendingResponseText = data.response;
          // Update latency display
          updateLatency(data.latency);
        }
      }

      // Binary message (audio)
      else {
        removeTyping();

        // Show agent text response
        if (pendingResponseText) {
          addMessage('agent', pendingResponseText);
          pendingResponseText = '';
        }

        // Play audio response
        try {
          const audioBlob = new Blob(
            [event.data],
            { type: 'audio/mpeg' }
          );
          const audioUrl = URL.createObjectURL(audioBlob);
          const audio = new Audio(audioUrl);

          setStatus('Agent speaking...', 'active');
          audio.play();

          audio.onended = () => {
            setStatus('Press the microphone to speak', '');
            URL.revokeObjectURL(audioUrl);
          };

          audio.onerror = () => {
            setStatus('Press the microphone to speak', '');
          };
        } catch (e) {
          console.error('Audio playback error:', e);
          setStatus('Press the microphone to speak', '');
        }
      }
    };
  }

  async function toggleRecording() {
    const btn = document.getElementById('micBtn');
    if (btn.classList.contains('disabled')) return;

    if (!isRecording) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            sampleRate: 16000,
            echoCancellation: true,
            noiseSuppression: true
          }
        });

        const options = { mimeType: 'audio/webm;codecs=opus' };
        mediaRecorder = new MediaRecorder(stream, options);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const arrayBuffer = await audioBlob.arrayBuffer();

          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(arrayBuffer);
            setStatus('Processing your speech...', 'active');
          }
          stream.getTracks().forEach(t => t.stop());
        };

        mediaRecorder.start(100);
        isRecording = true;
        btn.classList.add('recording');
        btn.innerHTML = '⏹️';
        setStatus('🔴 Recording... Press again to stop', 'active');

      } catch (err) {
        console.error('Microphone error:', err);
        setStatus('Microphone access denied. Please allow microphone.', 'error');
      }

    } else {
      mediaRecorder.stop();
      isRecording = false;
      btn.classList.remove('recording');
      btn.innerHTML = '🎤';
      setStatus('Processing...', 'active');
    }
  }

  function addMessage(role, text) {
    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
      <div class="bubble">${text}</div>
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    removeTyping();
    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function setStatus(msg, type) {
    const bar = document.getElementById('statusBar');
    bar.textContent = msg;
    bar.className = `status-bar ${type || ''}`;
  }

  function updateLatency(latency) {
    if (!latency) return;
    const setVal = (id, val) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = Math.round(val) + 'ms';
      el.className = 'latency-value';
      if (val > 300) el.classList.add('slow');
      if (val > 400) el.classList.add('very-slow');
    };
    setVal('sttLatency', latency.stt_ms);
    setVal('agentLatency', latency.agent_ms);
    setVal('ttsLatency', latency.tts_ms);
    setVal('totalLatency', latency.total_ms);
  }

  // Start WebSocket connection
  connectWebSocket();
</script>
</body>
</html>
